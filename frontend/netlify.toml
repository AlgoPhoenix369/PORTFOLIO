# Netlify Configuration
[build]
  command = "npm run build"
  publish = "dist"

# Redirects for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API Proxy to Supabase
[[redirects]]
  from = "/api/*"
  to = "https://ltpjidftzlhqsidfjevt.supabase.co/rest/v1/:splat"
  status = 200
  headers = {X-Forwarded-Host = "supabase"}

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables (set these in Netlify UI)
